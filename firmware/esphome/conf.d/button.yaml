# Button config for PrintFarmButton

binary_sensor:
- platform: gpio
  name: "Physical Confirm Printer Ready"
  id: confirm_ready_gpio
  internal: true
  pin:
    number: ${button_gpio}
    mode: INPUT_PULLDOWN
    inverted: false
  filters:
  - delayed_on: 100ms
  - delayed_off: 100ms
  on_press:
    then:
    - script.execute: handle_button_press
