light:
- platform: esp32_rmt_led_strip
  name: "PrintFarmButton RGB"
  id: printfarmbutton_rgb
  chipset: WS2812
  pin: ${led_gpio}
  num_leds: ${num_leds}
  rgb_order: GRB
  # rmt_channel: 0 # Removed invalid option
  # rmt_symbols: 96
  state_topic:
  internal: false #set to true to hide
  restore_mode: ALWAYS_OFF
  effects:
  - addressable_rainbow:
      name: Rainbow
      speed: 25
      width: 15
  - pulse:
      name: Pulse
      transition_length: 0.3s
      max_brightness: 100%
      min_brightness: 50%
      update_interval: 0.3s
  # Downloading / starting: gentle breathing between blue (idle) and white and back.
  # Distinct from the orange warmup so the two are never confused.
  - addressable_lambda:
      name: DownloadPulse
      update_interval: 16ms
      lambda: |-
        const uint32_t period = 2000; // full blue -> white -> blue breathe
        uint32_t now = millis();
        float phase = (now % period) / (float)period;
        // Triangle 0 -> 1 -> 0: 0 = blue, 1 = white.
        float t = (phase < 0.5f) ? (phase * 2.0f) : ((1.0f - phase) * 2.0f);
        uint8_t rg = (uint8_t)(255.0f * t); // red+green ramp in to whiten the blue
        for (int i = 0; i < it.size(); i++) {
          it[i] = Color(rg, rg, 255);
        }
  # Cool-down: same pulse cadence/envelope as Pulse, but alternates purple/white each cycle.
  - addressable_lambda:
      name: CoolDownPulse
      update_interval: 16ms
      lambda: |-
        const uint32_t period = 600; // 2 * 0.3s, matches the stock Pulse cadence
        uint32_t now = millis();
        float phase = (now % period) / (float)period;
        // Triangle brightness envelope 50% -> 100% -> 50% (same range as Pulse).
        float b = (phase < 0.5f) ? (0.5f + phase) : (1.5f - phase);
        // Alternate color every full pulse cycle: purple, white, purple, white...
        bool white = ((now / period) % 2) == 1;
        uint8_t r = white ? 255 : 230; // 230 ~ 0.9 (finished magenta R)
        uint8_t g = white ? 255 : 0;
        uint8_t bl = white ? 255 : 179; // 179 ~ 0.7 (finished magenta B)
        r = (uint8_t)(r * b);
        g = (uint8_t)(g * b);
        bl = (uint8_t)(bl * b);
        for (int i = 0; i < it.size(); i++) {
          it[i] = Color(r, g, bl);
        }
  # - addressable_scan:
  #     name: Scan
  - addressable_lambda:
      name: Left2Right
      update_interval: 0.03s # Faster refresh for smoother animation
      lambda: |-
        int num_leds = it.size();
        const int scan_time_ms = 1100; // Keep overall scan speed
        const int update_interval_ms = scan_time_ms / num_leds;
        const int num_dots = 2; // Number of moving dot pairs
        static uint32_t last_update = 0;
        static int pos = 0;
        uint32_t now = millis();
        if (now - last_update > update_interval_ms) {
          pos++;
          if (pos >= num_leds) pos = 0;
          last_update = now;
        }
        for (int i = 0; i < num_leds; i++) {
          it[i] = Color(0, 255, 0); // Green background
        }
        // Place 2 pairs of moving dots: white then yellow
        for (int d = 0; d < num_dots; d++) {
          int dot_pos = (pos + (d * num_leds) / num_dots) % num_leds;
          it[dot_pos] = Color(255, 255, 255); // First dot: white
          int dot_pos2 = (dot_pos + 1) % num_leds;
          it[dot_pos2] = Color(255, 255, 0); // Second dot: yellow
        }
