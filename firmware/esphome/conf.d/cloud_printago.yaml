        if (!x.empty() && !id(api_key_text).state.empty()) {
          id(fetch_printago_printers).execute();
          // If printer_id restored before credentials, MQTT never enabled — retry now.
          std::string pid = id(printer_id).state;
          if (!pid.empty()) {
