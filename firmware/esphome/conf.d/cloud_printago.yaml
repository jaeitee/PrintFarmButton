script:
- id: clear_printer_selection
  mode: queued
  then:
  - lambda: |-
      ESP_LOGI("printago", "Clearing printer selection");
      // make_call → control() persists to NVS; publish_state alone does not.
      auto call = id(printer_id).make_call();
      call.set_value("");
      call.perform();
      id(printer_name).publish_state("");

- id: check_printago_status
  mode: queued
  then:
  - if:
      condition:
        and:
        - lambda: 'return !id(printer_id).state.empty();'
        - lambda: 'return !id(api_key_text).state.empty();'
        - lambda: 'return !id(storeid_text).state.empty();'
        - lambda: 'return !id(mqtt_endpoint_text).state.empty();'
        - lambda: 'return !id(mqtt_port_text).state.empty();'
      then:
      - http_request.get:
          url: !lambda |-
            return "https://api.printago.io/v1/printers/" + id(printer_id).state;
          request_headers:
            authorization: !lambda |-
              static std::string key;
              std::string raw_key = id(api_key_text).state;
              raw_key.erase(std::remove_if(raw_key.begin(), raw_key.end(), ::isspace), raw_key.end());
              key = "ApiKey " + raw_key;
              return key.c_str();
            x-printago-storeid: !lambda |-
              static std::string store;
              std::string raw_store = id(storeid_text).state;
              raw_store.erase(std::remove_if(raw_store.begin(), raw_store.end(), ::isspace), raw_store.end());
              store = raw_store;
              return store.c_str();
          capture_response: true
          max_response_buffer_size: 2048
          on_response:
            then:
            - lambda: |-
                ESP_LOGI("printago", "HTTP Response code: %d", response->status_code);
                ESP_LOGI("printago", "Response body length: %d bytes", body.length());
                if (response->status_code == 200) {
                  JsonDocument doc;
                  DeserializationError error = deserializeJson(doc, body);
                  if (error) {
                    ESP_LOGW("printago", "Failed to parse JSON: %s", error.c_str());
                    return;
                  }
                  bool confirmed_ready = doc["confirmedReady"] | false;
                  bool is_available = doc["isAvailable"] | false;
                  bool is_online = doc["isOnline"] | false;
                  
                  // Extract and set printer name from metadata if available
                  if (!doc["metadata"].isNull() && !doc["metadata"]["name"].isNull()) {
                    const char* name = doc["metadata"]["name"].as<const char*>();
                    if (name != nullptr) {
                      ESP_LOGI("printago", "Set printer name to: %s", name);
                      id(printer_name).publish_state(name);
                    }
                  }
                  
                  id(printer_confirmed_ready_sensor).publish_state(confirmed_ready);
                  id(printer_is_available_sensor).publish_state(is_available);
                  id(printer_is_online_sensor).publish_state(is_online);
                } else {
                  ESP_LOGW("printago", "HTTP error %d", response->status_code);
                }
      else:
      - lambda: |-
          ESP_LOGW("printago", "Not running check_printago_status: printer_id, api_key_text, or storeid_text is missing");

- id: clear_printago_status
  mode: queued
  then:
  - lambda: |-
      // Clear all global printer status variables
      id(heat_soak_start_ms) = 0;
      id(cool_down_start_ms) = 0;
      id(job_had_heat_soak) = false;
      id(printer_confirmed_ready_sensor).publish_state(false);
      id(printer_is_available_sensor).publish_state(false);
      id(printer_is_online_sensor).publish_state(false);
      id(is_downloading).publish_state(false);
      id(is_warming).publish_state(false);
      id(is_cooling).publish_state(false);
      id(printer_name).publish_state("");  // Clear printer name

      ESP_LOGI("printago", "Cleared all printer status globals - all set to false");

# Post-print cool-down evaluation. Ends cool-down (locally, no API call) when the
# configured max time elapses OR the selected bed/chamber temps reach threshold.
# Called from the 5s interval and whenever MQTT refreshes temps while cooling.
- id: evaluate_cool_down
  mode: queued
  then:
  - if:
      condition:
        lambda: 'return id(cool_down_start_ms) != 0;'
      then:
      - lambda: |-
          uint32_t mins = (uint32_t)id(cool_down_minutes).state;
          if (mins < 1) mins = 60;
          bool time_done = (millis() - id(cool_down_start_ms)) >= (mins * 60000UL);

          // Effective temp waits: chamber is ignored if this printer doesn't report a chamber temp.
          bool bed_wait = id(cool_down_wait_bed).state;
          bool chamber_wait = id(cool_down_wait_chamber).state && id(chamber_temp_known);
          bool temp_gate_active = bed_wait || chamber_wait;

          bool temp_ok = false;
          if (temp_gate_active) {
            float thr = id(cool_down_temp).state;
            bool bed_ok = true;
            if (bed_wait) {
              bed_ok = (id(last_bed_temp) > -999.0f) && (id(last_bed_temp) <= thr);
            }
            bool chamber_ok = true;
            if (chamber_wait) {
              chamber_ok = (id(last_chamber_temp) > -999.0f) && (id(last_chamber_temp) <= thr);
            }
            temp_ok = bed_ok && chamber_ok;
          }

          if (time_done || (temp_gate_active && temp_ok)) {
            ESP_LOGI("printago", "Cool-down ended (%s)", time_done ? "max time" : "temp threshold");
            id(cool_down_start_ms) = 0;
            id(job_had_heat_soak) = false;
            id(is_cooling).publish_state(false);
          }

- id: update_led_color
  mode: queued
  then:
  - if:
      condition:
        not:
        - lambda: 'return id(printer_is_online_sensor).state;'
      then: # LED white on offline

      # - light.turn_on:
      #     id: printfarmbutton_rgb
      #     red: 1.0
      #     green: 1.0
      #     blue: 1.0
      #     effect: none
      #     brightness: 90%
      else:
      - if:
          condition:
            or:
            - lambda: 'return id(printer_has_error_sensor).state;'
            - lambda: 'return id(printer_has_warning_sensor).state;'
          then:
          - light.turn_on:
              id: printfarmbutton_rgb
              red: 1.0
              green: 0.0
              blue: 0.0
              effect: none
              brightness: 90%
          else:
          - if:
              condition:
                and:
                - lambda: 'return id(is_downloading).state;'
              then:
              # Downloading / starting — blue breathing to white and back (was green/Left2Right).
              - light.turn_on:
                  id: printfarmbutton_rgb
                  effect: DownloadPulse
                  brightness: 90%
              else:
              - if:
                  condition:
                    lambda: 'return id(is_warming).state;'
                  then:
                  # Orange (Warming / heat soak) — solid, no pulse
                  - light.turn_on:
                      id: printfarmbutton_rgb
                      red: 1.0
                      green: 0.4
                      blue: 0.0
                      effect: none
                      brightness: 90%
                  else:
                  - if:
                      condition:
                        lambda: 'return id(is_cooling).state;'
                      then:
                      # Cool-down — pulses like finished purple but alternates purple/white each cycle.
                      # Base color/brightness are set by the CoolDownPulse addressable effect itself.
                      - light.turn_on:
                          id: printfarmbutton_rgb
                          effect: CoolDownPulse
                          brightness: 90%
                      else:
                      - if:
                          condition:
                            and:
                            - lambda: 'return id(printer_confirmed_ready_sensor).state;'
                            - lambda: 'return id(printer_is_available_sensor).state;'
                          then:
                          # Blue (Ready)
                          - light.turn_on:
                              id: printfarmbutton_rgb
                              red: 0.0
                              green: 0.0
                              blue: 1.0
                              effect: none
                              brightness: 90%
                          else:
                          - if:
                              condition:
                                and:
                                - lambda: 'return !id(printer_confirmed_ready_sensor).state;'
                                - lambda: 'return id(printer_is_available_sensor).state;'
                              then:
                              # Magenta (Set Ready)
                              - light.turn_on:
                                  id: printfarmbutton_rgb
                                  red: 0.9
                                  green: 0.0
                                  blue: 0.7
                                  effect: Pulse
                                  brightness: 90%
                              else:
                              - if:
                                  condition:
                                    and:
                                    - lambda: 'return !id(printer_is_available_sensor).state;'
                                    - lambda: 'return !id(printer_confirmed_ready_sensor).state;'
                                  then:
                                  # Green (Busy)
                                  - light.turn_on:
                                      id: printfarmbutton_rgb
                                      red: 0.0
                                      green: 1.0
                                      blue: 0.0
                                      effect: none
                                      brightness: 90%
                                  else:
                                  # Fallback/default
                                  - light.turn_on:
                                      id: printfarmbutton_rgb
                                      red: 1.0
                                      green: 1.0
                                      blue: 1.0
                                      effect: none
                                      brightness: 90%

# Physical button: skip heat soak while warming, otherwise mark bed clear/ready
- id: handle_button_press
  mode: queued
  then:
  - if:
      condition:
        lambda: 'return id(is_warming).state;'
      then:
      - script.execute: skip_heat_soak
      else:
      - lambda: 'id(ready_http_retries) = 0;'
      - script.execute: mark_printer_ready

- id: skip_heat_soak
  mode: queued
  then:
  - lambda: |-
      ESP_LOGI("printago", "Skipping remaining heat soak (timer kept until resume succeeds)");
      id(resume_http_retries) = 0;
  - script.execute: resume_print

- id: resume_print
  mode: queued
  then:
  - if:
      condition:
        and:
        - lambda: 'return !id(printer_id).state.empty();'
        - lambda: 'return !id(api_key_text).state.empty();'
        - lambda: 'return !id(storeid_text).state.empty();'
      then:
      # Drop MQTT TLS socket so HTTPS can connect (ESP32-C3 socket starvation).
      - lambda: |-
          ESP_LOGI("printago", "Pausing MQTT for resume HTTPS");
          id(mqtt_api_pause) = true;
          id(mqtt_client_id).disable();
      - delay: 1s
      - http_request.send:
          method: POST
          url: "https://api.printago.io/v1/printer-commands/send"
          request_headers:
            authorization: !lambda |-
              static std::string key;
              std::string raw_key = id(api_key_text).state;
              raw_key.erase(std::remove_if(raw_key.begin(), raw_key.end(), ::isspace), raw_key.end());
              key = "ApiKey " + raw_key;
              return key.c_str();
            x-printago-storeid: !lambda |-
              static std::string store;
              std::string raw_store = id(storeid_text).state;
              raw_store.erase(std::remove_if(raw_store.begin(), raw_store.end(), ::isspace), raw_store.end());
              store = raw_store;
              return store.c_str();
            content-type: application/json
          body: !lambda |-
            return std::string("{\"ids\":[\"") + id(printer_id).state + "\"],\"command\":{\"command\":\"resume\"}}";
          capture_response: true
          max_response_buffer_size: 2048
          on_response:
            then:
            - lambda: |-
                ESP_LOGI("printago", "Resume print response: %d", response->status_code);
                if (response->status_code == 200 || response->status_code == 201) {
                  ESP_LOGI("printago", "Print resumed (heat soak skipped or finished)");
                  id(heat_soak_start_ms) = 0;
                  id(resume_http_retries) = 0;
                  id(is_warming).publish_state(false);
                } else {
                  ESP_LOGW("printago", "Failed to resume print (%d): %s",
                           response->status_code, body.c_str());
                }
                id(mqtt_api_pause) = false;
                id(mqtt_client_id).enable();
          on_error:
            then:
            - if:
                condition:
                  lambda: 'return id(resume_http_retries) < 3;'
                then:
                - lambda: |-
                    id(resume_http_retries)++;
                    ESP_LOGW("printago", "Resume HTTP connect failed, retry %d/3 (MQTT still paused)",
                             id(resume_http_retries));
                - delay: 2s
                - script.execute: resume_print
                else:
                - lambda: |-
                    id(resume_http_retries) = 0;
                    ESP_LOGE("printago", "Resume HTTP connect failed after 3 retries; restoring MQTT");
                    id(mqtt_api_pause) = false;
                    id(mqtt_client_id).enable();
      else:
      - lambda: |-
          ESP_LOGW("printago", "Not running resume_print: printer_id, api_key, or storeid missing");

- id: mark_printer_ready
  mode: queued
  then:
  - if:
      condition:
        and:
        - lambda: 'return !id(printer_id).state.empty();'
        - lambda: 'return !id(api_key_text).state.empty();'
        - lambda: 'return !id(storeid_text).state.empty();'
        - lambda: 'return !id(mqtt_endpoint_text).state.empty();'
        - lambda: 'return !id(mqtt_port_text).state.empty();'
        - lambda: 'return !id(printer_confirmed_ready_sensor).state;'
        - lambda: 'return id(printer_is_available_sensor).state;'
      then:
      - lambda: |-
          ESP_LOGI("printago", "Pausing MQTT for confirm-ready HTTPS");
          id(mqtt_api_pause) = true;
          id(mqtt_client_id).disable();
      - delay: 1s
      - http_request.send:
          method: PATCH
          url: !lambda |-
            return "https://api.printago.io/v1/printers/confirm-ready";
          request_headers:
            authorization: !lambda |-
              static std::string key;
              std::string raw_key = id(api_key_text).state;
              raw_key.erase(std::remove_if(raw_key.begin(), raw_key.end(), ::isspace), raw_key.end());
              key = "ApiKey " + raw_key;
              return key.c_str();
            x-printago-storeid: !lambda |-
              static std::string store;
              std::string raw_store = id(storeid_text).state;
              raw_store.erase(std::remove_if(raw_store.begin(), raw_store.end(), ::isspace), raw_store.end());
              store = raw_store;
              return store.c_str();
            content-type: application/json
          body: !lambda |-
            return std::string("{\"ready\": true, \"ids\": [\"") + id(printer_id).state + "\"]}";
          capture_response: true
          max_response_buffer_size: 2048
          on_response:
            then:
            - lambda: |-
                ESP_LOGI("printago", "Mark printer ready response: %d", response->status_code);
                if (response->status_code == 200) {
                  ESP_LOGI("printago", "Printer marked as ready");
                  id(ready_http_retries) = 0;
                  // Bed cleared by operator: end any active cool-down.
                  id(cool_down_start_ms) = 0;
                  id(job_had_heat_soak) = false;
                  id(is_cooling).publish_state(false);
                  // Optimistic UI: entities MQTT may lag after reconnect.
                  id(printer_confirmed_ready_sensor).publish_state(true);
                } else {
                  ESP_LOGW("printago", "Failed to mark printer as ready (%d): %s",
                           response->status_code, body.c_str());
                }
                id(mqtt_api_pause) = false;
                id(mqtt_client_id).enable();
            - script.execute: update_led_color
          on_error:
            then:
            - if:
                condition:
                  lambda: 'return id(ready_http_retries) < 3;'
                then:
                - lambda: |-
                    id(ready_http_retries)++;
                    ESP_LOGW("printago", "Confirm-ready HTTP connect failed, retry %d/3 (MQTT still paused)",
                             id(ready_http_retries));
                - delay: 2s
                - script.execute: mark_printer_ready
                else:
                - lambda: |-
                    id(ready_http_retries) = 0;
                    ESP_LOGE("printago", "Confirm-ready HTTP connect failed after 3 retries; restoring MQTT");
                    id(mqtt_api_pause) = false;
                    id(mqtt_client_id).enable();
      else:
      - lambda: |-
          ESP_LOGW("printago", "Not running mark_printer_ready: printer is not in the correct state (must be available and not already confirmed ready), or required fields are missing");

- id: fetch_printago_printers
  mode: queued
  then:
  - if:
      condition:
        and:
        - lambda: 'return !id(api_key_text).state.empty();'
        - lambda: 'return !id(storeid_text).state.empty();'
      then:
      # Show loading state
      - lambda: |-
          ESP_LOGI("printago", "Starting printer fetch...");
          // Update display to show loading state
          id(available_printers_display).publish_state("Loading printers...");
      - http_request.get:
          url: "https://api.printago.io/v1/printers"
          request_headers:
            authorization: !lambda |-
              static std::string key;
              std::string raw_key = id(api_key_text).state;
              raw_key.erase(std::remove_if(raw_key.begin(), raw_key.end(), ::isspace), raw_key.end());
              key = "ApiKey " + raw_key;
              return key.c_str();
            x-printago-storeid: !lambda |-
              static std::string store;
              std::string raw_store = id(storeid_text).state;
              raw_store.erase(std::remove_if(raw_store.begin(), raw_store.end(), ::isspace), raw_store.end());
              store = raw_store;
              return store.c_str();
          capture_response: true
          # Full /v1/printers payloads exceed 8KB once a farm has ~6+ printers.
          # Truncation produced invalid JSON → "No printers available" and a long web_server block.
          max_response_buffer_size: 65536
          on_response:
            then:
            - lambda: |-
                ESP_LOGI("printago", "Fetch printers response: %d", response->status_code);
                if (response->status_code == 200) {
                  ESP_LOGI("printago", "Response body length: %d bytes", body.length());

                  // Detect hard truncation at the HTTP buffer cap (common failure mode).
                  const size_t kMaxBody = 65536;
                  if (body.length() >= kMaxBody) {
                    ESP_LOGW("printago", "Printer list response hit %d-byte buffer; list may be incomplete", (int)kMaxBody);
                  }

                  // Only keep id/name so ArduinoJson does not allocate the full printer objects.
                  JsonDocument filter;
                  filter[0]["id"] = true;
                  filter[0]["name"] = true;
                  filter[0]["metadata"]["name"] = true;

                  JsonDocument doc;
                  DeserializationError error = deserializeJson(doc, body, DeserializationOption::Filter(filter));

                  if (!error && doc.is<JsonArray>()) {
                    JsonArray printers = doc.as<JsonArray>();
                    ESP_LOGI("printago", "Found %d printers", printers.size());

                    id(printago_printer_ids).clear();
                    id(printago_printer_names).clear();

                    std::vector<std::pair<std::string, std::string>> printer_pairs;

                    for (JsonVariant printer : printers) {
                      if (printer.is<JsonObject>()) {
                        JsonObject printerObj = printer.as<JsonObject>();
                        const char* printer_id = printerObj["id"] | "unknown";
                        const char* name = "unnamed";
                        if (!printerObj["name"].isNull()) {
                          name = printerObj["name"].as<const char*>();
                        } else if (!printerObj["metadata"].isNull() && !printerObj["metadata"]["name"].isNull()) {
                          name = printerObj["metadata"]["name"].as<const char*>();
                        }
                        if (name == nullptr) {
                          name = "unnamed";
                        }
                        ESP_LOGI("printago", "Printer: %s (%s)", name, printer_id);

                        if (strcmp(printer_id, "unknown") != 0) {
                          printer_pairs.push_back(std::make_pair(std::string(name), std::string(printer_id)));
                        }
                      }
                    }

                    std::sort(printer_pairs.begin(), printer_pairs.end(),
                      [](const std::pair<std::string, std::string>& a, const std::pair<std::string, std::string>& b) {
                        std::string name_a = a.first;
                        std::string name_b = b.first;
                        std::transform(name_a.begin(), name_a.end(), name_a.begin(), ::tolower);
                        std::transform(name_b.begin(), name_b.end(), name_b.begin(), ::tolower);
                        return name_a < name_b;
                      });

                    for (const auto& pair : printer_pairs) {
                      id(printago_printer_names).push_back(pair.first);
                      id(printago_printer_ids).push_back(pair.second);
                      ESP_LOGI("printago", "Sorted printer: %s (%s)", pair.first.c_str(), pair.second.c_str());
                    }

                    ESP_LOGI("printago", "Stored %d sorted printers in global vectors", id(printago_printer_ids).size());

                    if (id(printago_printer_ids).size() == 1 && id(printer_id).state.empty()) {
                      std::string first_id = id(printago_printer_ids)[0];
                      std::string first_name = id(printago_printer_names)[0];
                      ESP_LOGI("printago", "Auto-selecting single printer: %s (%s)", first_name.c_str(), first_id.c_str());
                      // make_call → control() persists to NVS; publish_state alone does not.
                      auto call = id(printer_id).make_call();
                      call.set_value(first_id);
                      call.perform();
                    } else if (id(printago_printer_ids).size() == 0) {
                      id(clear_printer_selection).execute();
                    }

                    id(available_printers_display).update();
                    id(printer_select).update();
                    id(update_printer_select_options).execute();
                  } else {
                    if (error) {
                      ESP_LOGW("printago", "Failed to parse JSON: %s (body=%d bytes)", error.c_str(), body.length());
                    } else {
                      ESP_LOGW("printago", "Failed to parse JSON response (expected array)");
                    }
                    if (body.length() >= kMaxBody) {
                      id(available_printers_display).publish_state("Error: printer list too large");
                    } else {
                      id(available_printers_display).publish_state("Error loading printers");
                    }
                    id(printer_select).update();
                  }
                } else {
                  ESP_LOGW("printago", "HTTP error %d", response->status_code);
                  id(available_printers_display).publish_state("Error: HTTP " + std::to_string(response->status_code));
                  id(printer_select).update();
                }
      else:
      - lambda: |-
          ESP_LOGW("printago", "Not running fetch_printago_printers: api_key_text or storeid_text is missing");
          // Clear vectors and update dropdown when fetch fails
          id(printago_printer_ids).clear();
          id(printago_printer_names).clear();
          id(available_printers_display).update();
          id(printer_select).update();
      - script.execute: clear_printer_selection
      - script.execute: update_printer_select_options

- id: update_printer_select_options
  mode: queued
  then:
  - lambda: |-
      // Log the current printer options for debugging
      ESP_LOGI("printago", "Available printers:");
      auto& names = id(printago_printer_names);
      auto& ids = id(printago_printer_ids);

      if (names.empty()) {
        ESP_LOGI("printago", "  No printers available");
      } else {
        for (size_t i = 0; i < names.size() && i < ids.size(); i++) {
          ESP_LOGI("printago", "  %d: %s (%s)", (int)i+1, names[i].c_str(), ids[i].c_str());
        }
      }

      // Force update the select component display and options
      id(printer_select).update();

      // Also trigger a republish of the current state to force UI refresh
      id(printer_select).publish_state(id(printer_select).state);

text_sensor:
- platform: template
  name: "Printer Name"
  id: printer_name
  icon: "mdi:printer-3d"
  state_topic:
  web_server:
    sorting_group_id: printago
    sorting_weight: 8
  on_value:
    then:
    - lambda: 'pfb_update_alias(x);'

- platform: template
  name: "MQTT Client ID"
  id: mqtt_client_id_stored
  state_topic:
  internal: false
  web_server:
    sorting_group_id: printago
    sorting_weight: 10
  icon: "mdi:identifier"
  lambda: |-
    // Printago MQTT auth: username = store ID, password = API key,
    // client_id = apiclient_{first 24 chars of API key}_{suffix}
    std::string store = id(storeid_text).state;
    store.erase(std::remove_if(store.begin(), store.end(), ::isspace), store.end());
    std::string key = id(api_key_text).state;
    key.erase(std::remove_if(key.begin(), key.end(), ::isspace), key.end());

    if (store.empty()) {
      ESP_LOGW("mqtt", "Store ID is empty, cannot generate client_id");
      return std::string("");
    }

    std::string mac = get_mac_address();
    mac.erase(std::remove(mac.begin(), mac.end(), ':'), mac.end());
    std::string mac_suffix = mac.length() >= 6 ? mac.substr(mac.length() - 6) : mac;
    std::string key_id = key.substr(0, 24);
    std::string client_id = "apiclient_" + key_id + "_" + mac_suffix;

    id(mqtt_client_id).set_username(store.c_str());
    id(mqtt_client_id).set_password(key.c_str());
    id(mqtt_client_id).set_client_id(client_id.c_str());

    ESP_LOGI("mqtt", "Generated client_id: %s", client_id.c_str());
    ESP_LOGI("mqtt", "MQTT Credentials Set - Username (store): %s, Client ID: %s", store.c_str(), client_id.c_str());
    ESP_LOGI("mqtt", "Current MQTT Config - Broker: %s, Port: %s",
             id(mqtt_endpoint_text).state.c_str(),
             id(mqtt_port_text).state.c_str());
    return client_id;
  on_value:
    then:
    - lambda: |-
        ESP_LOGI("mqtt", "Client ID value updated to: %s", x.c_str());

- platform: template
  name: "Available Printers"
  id: available_printers_display
  icon: "mdi:printer-search"
  internal: true
  lambda: |-
    // Enhanced display with count and current selection indicator
    std::string printer_list = "";
    auto& names = id(printago_printer_names);
    auto& ids = id(printago_printer_ids);
    std::string current_id = id(printer_id).state;

    if (names.empty()) {
      return std::string("No printers found");
    }

    // Add count prefix and current selection
    std::string current_name = "";
    for (size_t i = 0; i < names.size() && i < ids.size(); i++) {
      if (ids[i] == current_id) {
        current_name = names[i];
        break;
      }
    }

    printer_list = std::to_string(names.size()) + " printer" + (names.size() == 1 ? "" : "s");
    if (!current_name.empty()) {
      printer_list += " (Selected: " + current_name + ")";
    }

    return printer_list;

