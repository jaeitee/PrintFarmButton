- platform: template
  id: printer_id_previous
  mode: text
  restore_value: false
  optimistic: true
  state_topic:
  internal: true

- platform: template
  name: "Printer ID" #This name is the key for the rest api, do not change
  id: printer_id
  mode: text
  restore_value: true
  optimistic: true
  state_topic:
  internal: true
  web_server:
    sorting_group_id: printago
    sorting_weight: 1
  on_value:
    then:
    - lambda: |-
        std::string previous_printer_id = id(printer_id_previous).state;
        std::string new_printer_id = x;

        ESP_LOGI("mqtt", "Printer ID changing from '%s' to '%s'", previous_printer_id.c_str(), new_printer_id.c_str());

        // Check if we should connect/reconnect to MQTT
        if (new_printer_id.empty() || id(storeid_text).state.empty() || id(mqtt_endpoint_text).state.empty() || id(mqtt_port_text).state.empty()) {
          ESP_LOGI("mqtt", "Username, printer ID, mqtt_endpoint or mqtt_port missing, disabling MQTT");
          id(clear_printago_status).execute();
          id(mqtt_client_id).disable();
          return;
        }

        ESP_LOGI("mqtt", "All required fields set, enabling MQTT");
        id(clear_printago_status).execute();
        id(check_printago_status).execute();
        // Refresh credentials from current Store ID + API key before connect
        id(mqtt_client_id_stored).update();
        id(mqtt_client_id).enable();

        // Unsubscribe from previous topics
        if (!previous_printer_id.empty() && !id(storeid_text).state.empty()) {
          std::string old_topic = "stores/" + id(storeid_text).state + "/printer-stats/" + previous_printer_id;
          std::string alt_old_topic = "stores/" + id(storeid_text).state + "/entities/printers/" + previous_printer_id;
          ESP_LOGI("mqtt", "Unsubscribing from previous topics");
          id(mqtt_client_id).unsubscribe(old_topic);
          id(mqtt_client_id).unsubscribe(alt_old_topic);
        }

        // Store the new value
        id(printer_id_previous).publish_state(new_printer_id);

        // Subscribe to printer stats topic
        std::string stats_topic = "stores/" + id(storeid_text).state + "/printer-stats/" + new_printer_id;
        ESP_LOGI("mqtt", "Subscribing to topic: %s", stats_topic.c_str());

        id(mqtt_client_id).subscribe_json(stats_topic, [](const std::string &topic, JsonObject root) {
          ESP_LOGV("mqtt", "Received JSON on stats topic");

          // Capture previous availability for finish-edge detection (cool-down start).
          bool prev_available = id(printer_is_available_sensor).state;

          // Handle basic status - simple approach
          bool new_available = !root["isAvailable"].isNull() ? (bool)root["isAvailable"] : false;
          id(printer_is_online_sensor).publish_state(!root["isOnline"].isNull() ? (bool)root["isOnline"] : false);
          id(printer_is_available_sensor).publish_state(new_available);

          // Cache bed/chamber temps from data.temps (no extra HTTP polling).
          // -1000 sentinel = unknown. chamber_temp_known tracks whether this printer reports a chamber temp.
          if (!root["data"].isNull()) {
            JsonObject data = root["data"];
            if (!data["temps"].isNull()) {
              JsonObject temps = data["temps"];
              if (!temps["bedTemp"].isNull()) {
                id(last_bed_temp) = (float)temps["bedTemp"];
              }
              if (!temps["chamberTemp"].isNull()) {
                id(last_chamber_temp) = (float)temps["chamberTemp"];
                id(chamber_temp_known) = true;
              } else {
                id(chamber_temp_known) = false;
              }
            }
          }
          
          // Handle printer name
          if (!root["metadata"].isNull()) {
            JsonObject metadata = root["metadata"];
            if (!metadata["name"].isNull()) {
              const char* name = metadata["name"];
              if (name != nullptr) {
                id(printer_name).publish_state(name);
              }
            }
          }

          // Handle health status
          // Bambu user-pause HMS (M400 U1 / screen pause) is reported as PRINT ERROR
          // but is not a hard fault — keep LED from going red over orange warming.
          bool error_state = false;
          bool warning_state = false;
          if (!root["data"].isNull()) {
            JsonObject data = root["data"];
            if (!data["health"].isNull()) {
              JsonObject health = data["health"];
              auto is_user_pause_hms = [](JsonObject err) -> bool {
                const char* code = err["code"];
                const char* msg = err["message"];
                auto normalize = [](const char* s) -> std::string {
                  std::string out;
                  if (s == nullptr) return out;
                  for (const char* p = s; *p; ++p) {
                    char c = (char)tolower((unsigned char)*p);
                    if ((c >= '0' && c <= '9') || (c >= 'a' && c <= 'f')) out.push_back(c);
                  }
                  return out;
                };
                std::string c = normalize(code);
                if (c == "03008013" || c == "03008001" || c == "03008000") return true;
                if (msg != nullptr) {
                  std::string m(msg);
                  for (char &ch : m) ch = (char)tolower((unsigned char)ch);
                  if (m.find("paused by the user") != std::string::npos) return true;
                }
                return false;
              };
              if (!health["errors"].isNull() && health["errors"].is<JsonArray>()) {
                for (JsonObject err : health["errors"].as<JsonArray>()) {
                  if (!is_user_pause_hms(err)) {
                    error_state = true;
                    break;
                  }
                }
              }
              if (!health["warnings"].isNull() && health["warnings"].is<JsonArray>() && health["warnings"].size() > 0) {
                warning_state = true;
              }
            }
          }
          id(printer_has_error_sensor).publish_state(error_state);
          id(printer_has_warning_sensor).publish_state(warning_state);

          // Handle downloading state
          bool download_state = false;
          if (!root["state"].isNull()) {
            const char* state = root["state"];
            if (state != nullptr && strcmp(state, "PREPARE") == 0) {
              download_state = true;
            }
          }
          id(is_downloading).publish_state(download_state);

          // Heat soak / warming: early-print pause from M400 U1 in machine start G-code.
          // Timer uses heat_soak_start_ms so WiFi drops don't reset the heat-soak countdown.
          bool warming_state = false;
          bool have_state = !root["state"].isNull();
          if (have_state && !download_state && !(bool)root["isAvailable"]) {
            int layer = 0;
            int percent = 0;
            const char* stage = nullptr;
            const char* activity = nullptr;
            if (!root["data"].isNull()) {
              JsonObject data = root["data"];
              if (!data["print"].isNull()) {
                JsonObject print = data["print"];
                if (!print["currentLayer"].isNull()) {
                  layer = (int)print["currentLayer"];
                }
                if (!print["percent"].isNull()) {
                  percent = (int)print["percent"];
                }
                if (!print["stage"].isNull()) {
                  stage = print["stage"];
                }
                if (!print["activity"].isNull()) {
                  activity = print["activity"];
                }
              }
            }

            bool early_print = (layer <= 0) && (percent <= 1);
            bool paused = false;
            const char* state = root["state"];
            if (state != nullptr) {
              paused = (strcasecmp(state, "PAUSE") == 0) ||
                       (strcasecmp(state, "paused") == 0) ||
                       (strcasecmp(state, "pause") == 0);
            }

            auto mentions_m400 = [](const char* value) -> bool {
              if (value == nullptr) return false;
              std::string s(value);
              for (char &c : s) c = (char)tolower((unsigned char)c);
              return s.find("m400") != std::string::npos;
            };

            warming_state = early_print && (paused || mentions_m400(stage) || mentions_m400(activity));
          }

          // Only update warming + timer from messages that include state (ignore sparse updates).
          // While warming: set start once. While not: clear start. WiFi silence leaves both unchanged.
          if (have_state) {
            if (warming_state) {
              if (id(heat_soak_start_ms) == 0) {
                id(heat_soak_start_ms) = millis();
                uint32_t mins = (uint32_t)id(heat_soak_minutes).state;
                if (mins < 1) mins = 15;
                ESP_LOGI("printago", "Heat soak timer started (%u min from now, survives WiFi drops)", mins);
              }
              // Remember this job heat-soaked so finish → cool-down.
              id(job_had_heat_soak) = true;
            } else if (id(heat_soak_start_ms) != 0) {
              id(heat_soak_start_ms) = 0;
              ESP_LOGI("printago", "Heat soak timer cleared (no longer warming)");
            }
            id(is_warming).publish_state(warming_state);

            // A new job clearly starting resets the heat-soak memory for cool-down.
            if (download_state) {
              id(job_had_heat_soak) = false;
            }

            // Post-print cool-down: start on the transition into finished/waiting-for-clear
            // (busy/not-available -> available) for a job that heat-soaked, and not already ready.
            bool confirmed_ready = id(printer_confirmed_ready_sensor).state;
            bool finish_edge = new_available && !prev_available && !confirmed_ready;
            if (finish_edge && id(job_had_heat_soak) && !warming_state) {
              if (id(cool_down_start_ms) == 0) {
                id(cool_down_start_ms) = millis();
                id(is_cooling).publish_state(true);
                uint32_t mins = (uint32_t)id(cool_down_minutes).state;
                if (mins < 1) mins = 60;
                ESP_LOGI("printago", "Cool-down started (up to %u min; survives WiFi drops)", mins);
              }
            }
          }

          // Re-evaluate cool-down end whenever stats (incl. fresh temps) arrive.
          id(evaluate_cool_down).execute();
        });

        // Subscribe to entities topic for confirmedReady
        std::string entities_topic = "stores/" + id(storeid_text).state + "/entities/printers";
        ESP_LOGI("mqtt", "Subscribing to entities topic: %s", entities_topic.c_str());

        id(mqtt_client_id).subscribe_json(entities_topic, [new_printer_id](const std::string &topic, JsonObject root) {
          // Only update if the message contains the current printer's info
          if (!root["entities"].isNull()) {
            JsonObject entities = root["entities"];
            if (!entities[new_printer_id.c_str()].isNull()) {
              JsonObject printer_obj = entities[new_printer_id.c_str()];
              if (!printer_obj["confirmedReady"].isNull()) {
                bool ready_state = (bool)printer_obj["confirmedReady"];
                id(printer_confirmed_ready_sensor).publish_state(ready_state);
              }
            }
          }
          // Do NOT update the sensor if the message does not contain this printer's info
        });
select:
- platform: template
  name: "Select Printer"
  id: printer_select
  icon: "mdi:printer-search"
  web_server:
    sorting_group_id: printago
    sorting_weight: 7
  # Use dynamic options with real printer names
  options_lambda: |-
    auto& names = id(printago_printer_names);
    std::vector<std::string> options;

    if (names.empty()) {
      options.push_back("No printers available");
    } else {
      // Add real printer names as options
      for (const auto& name : names) {
        options.push_back(name);
      }
    }

    return options;
  lambda: |-
    // Return the actual printer name based on current state
    auto& names = id(printago_printer_names);
    auto& ids = id(printago_printer_ids);
    std::string current_id = id(printer_id).state;

    // If no printers are available
    if (names.empty()) {
      return std::string("No printers available");
    }

    // Find the current printer ID and return its name
    for (size_t i = 0; i < names.size() && i < ids.size(); i++) {
      if (ids[i] == current_id) {
        return names[i]; // Return the actual printer name
      }
    }

    // Do not fake the first printer as selected when printer_id is empty/unknown —
    // that hid the "selection not persisted" bug after reboot.
    return std::string("No printers available");
  set_action:
    then:
    - lambda: |-
        ESP_LOGI("printago", "Printer selected from dropdown: %s", x.c_str());

        auto& names = id(printago_printer_names);
        auto& ids = id(printago_printer_ids);

        // Handle special cases
        if (x == "No printers available") {
          ESP_LOGW("printago", "No printers available to select");
          return;
        }

        // Find the selected printer name in our vector and get its ID
        for (size_t i = 0; i < names.size() && i < ids.size(); i++) {
          if (names[i] == x) {
            std::string selected_id = ids[i];
            std::string selected_name = names[i];
            ESP_LOGI("printago", "Selected printer: %s (ID: %s)", selected_name.c_str(), selected_id.c_str());
            // make_call → control() persists to NVS; publish_state alone does not
            // (so reboot previously lost the selection).
            auto call = id(printer_id).make_call();
            call.set_value(selected_id);
            call.perform();
            // Trigger UI updates
            id(available_printers_display).update();
            return;
          }
        }

        ESP_LOGW("printago", "Unhandled selection: %s", x.c_str());

