globals:
- id: printago_printer_ids
  type: std::vector<std::string>
  restore_value: false

- id: printago_printer_names
  type: std::vector<std::string>
  restore_value: false

# millis() when heat soak (M400 U1) was first observed. 0 = not timing.
# Survives WiFi/MQTT drops; only cleared when soak ends or resume HTTP succeeds.
- id: heat_soak_start_ms
  type: uint32_t
  restore_value: false
  initial_value: '0'

# millis() when post-print cool-down started. 0 = not cooling.
# Survives WiFi/MQTT drops; cleared when cool-down ends, bed cleared, or new job starts.
- id: cool_down_start_ms
  type: uint32_t
  restore_value: false
  initial_value: '0'

# True once heat soak was observed for the current job (drives whether finish → cool-down).
- id: job_had_heat_soak
  type: bool
  restore_value: false
  initial_value: 'false'

# Latest bed/chamber temps from MQTT. -1000 = unknown / not reported this session.
- id: last_bed_temp
  type: float
  restore_value: false
  initial_value: '-1000.0f'

- id: last_chamber_temp
  type: float
  restore_value: false
  initial_value: '-1000.0f'

# True only when the most recent stats message included a chamber temp value.
- id: chamber_temp_known
  type: bool
  restore_value: false
  initial_value: 'false'

# HTTPS connect retries for button actions (ESP32-C3 MQTT+TLS socket pressure).
- id: resume_http_retries
  type: uint8_t
  restore_value: false
  initial_value: '0'

- id: ready_http_retries
  type: uint8_t
  restore_value: false
  initial_value: '0'

# Poll local countdown; resume when configured heat-soak minutes elapsed and still warming.
# If WiFi is down at expiry, retries every 5s until resume succeeds.
interval:
- interval: 5s
  then:
  - if:
      condition:
        and:
        - lambda: |-
            uint32_t mins = (uint32_t)id(heat_soak_minutes).state;
            if (mins < 1) mins = 15;
            return id(heat_soak_start_ms) != 0 &&
                   (millis() - id(heat_soak_start_ms)) >= (mins * 60000UL);
        - lambda: 'return id(is_warming).state;'
        - lambda: 'return id(mqtt_client_id)->is_connected();'
      then:
      - lambda: |-
          uint32_t mins = (uint32_t)id(heat_soak_minutes).state;
          if (mins < 1) mins = 15;
          ESP_LOGI("printago", "Heat soak auto-resume: %u min elapsed", mins);
          id(resume_http_retries) = 0;
      - script.execute: resume_print
  # Post-print cool-down: end on max time or temp threshold (local only, no API call).
  - script.execute: evaluate_cool_down
