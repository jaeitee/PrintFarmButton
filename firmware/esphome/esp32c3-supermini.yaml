substitutions:
  button_gpio: "4"
  led_gpio: "3"
  num_leds: "13"
  manifest_file: "manifest-supermini.json"

# https://www.espboards.dev/esp32/esp32-c3-super-mini/
esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf
    sdkconfig_options:
      # MQTT TLS + web UI (SSE log) + HTTPS API need concurrent sockets on C3.
      CONFIG_LWIP_MAX_SOCKETS: "16"
packages:
  common: !include common.yaml
  button: !include conf.d/button.yaml
