# Appended to the reported version. Empty for release builds; override at compile time
# for local test firmware, e.g. `-s version_suffix "-testing"` (see printfarmbutton.md).
substitutions:
  version_suffix: ""

esphome:
  name: printfarmbutton
  friendly_name: PrintFarmButton
  name_add_mac_suffix: true
  includes:
  - conf.d/pfb_mdns.h
  project:
    name: spuder.printfarmbutton
    version: ${version}${version_suffix}
  min_version: 2025.7.0
  on_boot:
    then:
    - light.turn_on:
        id: printfarmbutton_rgb
        effect: Rainbow
    - delay: 3s
    - lambda: |-
        // Set version once at boot
        id(printfarmbutton_version).publish_state("${version}${version_suffix}");
        ESP_LOGI("version", "Set installed version to: ${version}${version_suffix}");
        // Ensure MQTT username/password/client_id match restored Store ID + API key
        id(mqtt_client_id_stored).update();
        // Seed web UI auth from stored password, or device-derived default
        std::string p = id(web_ui_password_text).state;
        if (p.empty()) {
          std::string mac = get_mac_address();
          mac.erase(std::remove(mac.begin(), mac.end(), ':'), mac.end());
          std::string suffix = mac.length() >= 6 ? mac.substr(mac.length() - 6) : mac;
          p = "pfb-" + suffix;
        }
        id(pfb_web_base).set_auth_username("admin");
        id(pfb_web_base).set_auth_password(p.c_str());
        ESP_LOGI("web_auth", "Web UI auth seeded for user admin");
    - if:
        condition:
          lambda: 'return id(cloud_connection).state == "Printago";'
        then:
        - script.execute: check_printago_status

packages:
  led: !include conf.d/led.yaml
  web_server: !include conf.d/web_server.yaml
  web_auth: !include conf.d/web_auth.yaml
  cloud: !include conf.d/cloud.yaml
  cloud_printago: !include conf.d/cloud_printago.yaml
  mqtt: !include conf.d/mqtt.yaml
  mqtt_printago: !include conf.d/mqtt_printago.yaml
  wifi: !include conf.d/wifi.yaml
  update: !include conf.d/update.yaml
  version: !include conf.d/version.yaml
logger:
  # level: VERBOSE
  # logs:
  #   mqtt.component: VERBOSE
  #   mqtt.client: VERBOSE
  #   mqtt: VERBOSE

ota:
- platform: esphome
- platform: http_request
- platform: web_server

http_request:
  verify_ssl: false
  # MQTT TLS + HTTPS to api.printago.io compete for sockets on ESP32-C3;
  # longer timeouts reduce ESP_ERR_HTTP_CONNECT flakiness on button actions.
  timeout: 15s
  watchdog_timeout: 30s

improv_serial:
  next_url: http://{{device_name}}.local

api:
  reboot_timeout: 0s

external_components:
- source:
    type: git
    url: https://github.com/spuder/esphome
    ref: template_select_options
  components: [ template ]
  refresh: 0s
